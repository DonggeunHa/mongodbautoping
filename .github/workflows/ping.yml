name: Mongo Ping

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - run: npm install

      - run: node ping.js
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
